---
- name: k3s kubeconfig をローカルに取得
  hosts: raspi-master
  become: yes
  vars:
    local_kube_dir: "{{ lookup('env', 'HOME') }}/.kube"
    local_kubeconfig: "{{ lookup('env', 'HOME') }}/.kube/config"
    k3s_master_ip: "{{ ansible_host }}"

  tasks:
    - name: kubeconfig を一時ファイルとして取得
      fetch:
        src: /etc/rancher/k3s/k3s.yaml
        dest: /tmp/k3s-kubeconfig.yaml
        flat: yes

    - name: ローカルの ~/.kube ディレクトリを作成
      local_action:
        module: file
        path: "{{ local_kube_dir }}"
        state: directory
        mode: '0700'

    - name: kubeconfig の server アドレスを master の IP に書き換えてローカルに配置
      local_action:
        module: shell
        cmd: |
          sed 's|https://127\.0\.0\.1:6443\|https://localhost:6443|https://{{ k3s_master_ip }}:6443|g' \
            /tmp/k3s-kubeconfig.yaml > {{ local_kubeconfig }}
          chmod 600 {{ local_kubeconfig }}
          rm -f /tmp/k3s-kubeconfig.yaml
