---
# フェーズ1: raspi-master から node-token を取得
- name: raspi-master から k3s node-token を取得
  hosts: raspi-master
  become: yes
  tasks:
    - name: node-token を取得
      slurp:
        src: /var/lib/rancher/k3s/server/node-token
      register: k3s_token_raw

    - name: node-token を facts に保存
      set_fact:
        k3s_node_token: "{{ k3s_token_raw.content | b64decode | trim }}"

# フェーズ2: PC に k3s agent をインストール
- name: PC を k3s クラスターに追加
  hosts: pc
  become: yes

  roles:
    - common
    - k3s
