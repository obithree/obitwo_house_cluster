---
- name: システムパッケージを更新
  ansible.builtin.apt:
    update_cache: yes
    cache_valid_time: 3600
  become: yes

- name: 必要な依存パッケージをインストール
  ansible.builtin.apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
      - software-properties-common
      - wget
    state: present
  become: yes

# Google Chrome のインストール
- name: Google Chrome GPGキーの存在確認
  ansible.builtin.stat:
    path: /usr/share/keyrings/google-chrome-keyring.gpg
  register: chrome_gpg_key

- name: Google Chrome GPGキーをダウンロード
  ansible.builtin.get_url:
    url: https://dl.google.com/linux/linux_signing_key.pub
    dest: /tmp/google-chrome-keyring.asc
    mode: '0644'
  become: yes
  when: not chrome_gpg_key.stat.exists

- name: Google Chrome GPGキーを変換して保存
  ansible.builtin.shell: |
    gpg --dearmor < /tmp/google-chrome-keyring.asc > /usr/share/keyrings/google-chrome-keyring.gpg
    rm -f /tmp/google-chrome-keyring.asc
  become: yes
  when: not chrome_gpg_key.stat.exists

- name: Google Chrome リポジトリファイルの存在と内容を確認
  ansible.builtin.shell: |
    test -f /etc/apt/sources.list.d/google-chrome.list && \
    grep -q 'http://dl.google.com/linux/chrome/deb/' /etc/apt/sources.list.d/google-chrome.list
  register: chrome_repo_check
  changed_when: false
  failed_when: false

- name: Google Chrome リポジトリを追加
  ansible.builtin.apt_repository:
    repo: "deb [arch=amd64 signed-by=/usr/share/keyrings/google-chrome-keyring.gpg] http://dl.google.com/linux/chrome/deb/ stable main"
    filename: google-chrome
    state: present
    update_cache: no
  become: yes
  when: chrome_repo_check.rc != 0

- name: Google Chrome をインストール
  ansible.builtin.apt:
    name: google-chrome-stable
    state: present
    update_cache: yes
  become: yes

- name: パッケージリストを更新 (Chromeリポジトリ追加時のみ)
  ansible.builtin.apt:
    update_cache: yes
  become: yes
  when: chrome_repo_check.rc != 0

# VSCode のインストール (Snap)
- name: VSCode をインストール (snap)
  community.general.snap:
    name: code
    classic: yes
    state: present
  become: yes

# Steam のインストール (Snap)
- name: 32bit アーキテクチャの有効状態を確認
  ansible.builtin.shell: dpkg --print-foreign-architectures | grep -q i386
  register: i386_check
  changed_when: false
  failed_when: false

- name: 32bit アーキテクチャを有効化 (Steamなど32bitゲーム環境用)
  ansible.builtin.command: dpkg --add-architecture i386
  become: yes
  when: i386_check.rc != 0
  register: i386_added

- name: Steam をインストール (snap)
  community.general.snap:
    name: steam
    state: present
  become: yes

# Discord のインストール (Snap)
- name: Discord をインストール (snap)
  community.general.snap:
    name: discord
    state: present
  become: yes

# NVIDIA ドライバーのインストール
- name: ubuntu-drivers-common をインストール
  ansible.builtin.apt:
    name: ubuntu-drivers-common
    state: present
  become: yes

- name: NVIDIA GPU の検出
  ansible.builtin.command: ubuntu-drivers devices
  register: nvidia_devices
  become: yes
  changed_when: false
  failed_when: false

- name: NVIDIA GPU が検出されたか確認
  ansible.builtin.debug:
    msg: "{{ nvidia_devices.stdout }}"
  when: nvidia_devices.stdout != ""

- name: 推奨される NVIDIA ドライバーを自動インストール
  ansible.builtin.command: ubuntu-drivers autoinstall
  become: yes
  when: "'nvidia' in nvidia_devices.stdout.lower()"
  register: nvidia_install
  changed_when: "'Setting up' in nvidia_install.stdout"

- name: NVIDIA ドライバーのインストール状態を確認
  ansible.builtin.debug:
    msg: "NVIDIA ドライバーがインストールされました。システムを再起動してください。"
  when: "'nvidia' in nvidia_devices.stdout.lower()"

- name: NVIDIA GPU が見つからない場合の通知
  ansible.builtin.debug:
    msg: "NVIDIA GPUが検出されませんでした。ドライバーのインストールをスキップします。"
  when: "'nvidia' not in nvidia_devices.stdout.lower()"

# 開発ツールのインストール
- name: 開発ツールのインストール
  ansible.builtin.include_tasks: dev-tools.yml
  when: install_dev_tools | default(false)

- name: インストール完了メッセージ
  ansible.builtin.debug:
    msg: "すべてのソフトウェアのインストールが完了しました: Google Chrome, Steam, Discord, VSCode, NVIDIA Driver"

