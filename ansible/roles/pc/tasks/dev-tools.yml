---
# 開発ツールのインストール

# 便利なCLIツールのインストール
- name: 便利なCLIツールをインストール
  ansible.builtin.apt:
    name:
      - vim
      - git
      - htop
      - tmux
      - build-essential
      - net-tools
      - tree
      - jq
      - unzip
      - zip
      - ncdu
      - rsync
    state: present
  become: yes

# Docker のインストール
- name: Docker のインストールと設定
  ansible.builtin.import_tasks: docker.yml

# pyenv のインストール
- name: pyenv のインストールと設定
  ansible.builtin.import_tasks: pyenv.yml

# nvm + Node.js のインストール
- name: nvm + Node.js のインストールと設定
  ansible.builtin.import_tasks: nvm.yml

# Claude Code のインストール
- name: Claude Code のインストールと設定
  ansible.builtin.import_tasks: claude-code.yml

# aider のインストール
- name: aider のインストールと設定
  ansible.builtin.import_tasks: aider.yml

- name: 開発ツールのインストール完了メッセージ
  ansible.builtin.debug:
    msg: "開発ツールのインストールが完了しました: CLI Tools, Docker, Docker Compose, pyenv, nvm, Node.js, Claude Code, aider"
