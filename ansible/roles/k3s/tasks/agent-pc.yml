---
- name: k3s バイナリの存在確認
  ansible.builtin.stat:
    path: /usr/local/bin/k3s
  register: k3s_binary
  tags: k3s

- name: k3s server の API ポートが開くまで待機
  wait_for:
    host: "{{ hostvars[groups['raspi-master'][0]]['ansible_host'] | default(groups['raspi-master'][0]) }}"
    port: 6443
    timeout: 120
  when: not k3s_binary.stat.exists
  tags: k3s

- name: k3s エージェントをインストール (PC)
  ansible.builtin.shell: |
    curl -sfL https://get.k3s.io | \
      INSTALL_K3S_VERSION="{{ k3s_version }}" \
      K3S_URL="{{ k3s_server_url }}" \
      K3S_TOKEN="{{ hostvars[groups['raspi-master'][0]]['k3s_node_token'] }}" \
      INSTALL_K3S_EXEC="agent --node-label node-role=worker --node-label node-type=pc" \
      sh -
  when: not k3s_binary.stat.exists
  tags: k3s

- name: k3s-agent サービスを有効化・起動
  ansible.builtin.systemd:
    name: k3s-agent
    enabled: yes
    state: started
  tags: k3s

- name: NVIDIA Container Toolkit をセットアップ
  ansible.builtin.include_tasks: nvidia-container-toolkit.yml
  tags: nvidia
