---
# Raspberry Pi OS: /boot/firmware/cmdline.txt に cgroup 設定を追記
- name: cgroup 設定の現在の内容を取得 (Raspberry Pi OS)
  slurp:
    src: /boot/firmware/cmdline.txt
  register: cmdline_content
  when: ansible_facts['distribution'] == "Debian"
  tags: cgroup

- name: cgroup_memory と cgroup_enable を cmdline.txt に追記 (Raspberry Pi OS)
  lineinfile:
    path: /boot/firmware/cmdline.txt
    backrefs: yes
    regexp: '^((?!.*cgroup_enable=memory).*)'
    line: '\1 cgroup_enable=cpuset cgroup_enable=memory cgroup_memory=1 systemd.unified_cgroup_hierarchy=0'
  when:
    - ansible_facts['distribution'] == "Debian"
    - "'cgroup_memory=1' not in (cmdline_content.content | b64decode)"
  notify: reboot
  tags: cgroup

# Ubuntu: /etc/default/grub に cgroup 設定を追記
- name: cgroup 設定を GRUB_CMDLINE_LINUX に追加 (Ubuntu)
  lineinfile:
    path: /etc/default/grub
    regexp: '^GRUB_CMDLINE_LINUX='
    line: 'GRUB_CMDLINE_LINUX="cgroup_enable=cpuset cgroup_enable=memory cgroup_memory=1 systemd.unified_cgroup_hierarchy=0"'
  when: ansible_facts['distribution'] == "Ubuntu"
  notify: update grub and reboot
  tags: cgroup

- name: update-grub を実行 (Ubuntu)
  command: update-grub
  when: ansible_facts['distribution'] == "Ubuntu"
  tags: cgroup
