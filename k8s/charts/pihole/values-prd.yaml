# Pi-hole production environment values
image:
  repository: pihole/pihole
  tag: latest
  pullPolicy: IfNotPresent

replicaCount: 1

nodeSelector:
  node-role: worker

service:
  dns:
    type: LoadBalancer
    loadBalancerIP: 192.168.100.201
    loadBalancerClass: "io.metallb/io.metallb"
    port: 53
    nodePort: 30053
  web:
    type: ClusterIP
    port: 80
    nodePort: 30080

ingress:
  enabled: true
  className: nginx
  host: pihole.home

persistence:
  enabled: true
  storageClass: "local-path"
  size: 5Gi

env:
  TZ: Asia/Tokyo
  WEBPASSWORD: "admin123"

adlists:
  - https://raw.githubusercontent.com/StevenBlack/hosts/master/hosts
  - https://280blocker.net/files/280blocker_adblock_202602.txt

customDnsRecords:
  - domain: open-webui.home
    ip: 192.168.100.200
  - domain: argo-cd.home
    ip: 192.168.100.200
  - domain: pihole.home
    ip: 192.168.100.200
