apiVersion: v1
kind: Namespace
metadata:
  name: pihole
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: pihole-config
  namespace: pihole
data:
  dnsmasq.conf: |
    # Custom DNS records
    {{- range .Values.customDnsRecords }}
    address=/{{ .domain }}/{{ .ip }}
    {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: pihole-dns
  namespace: pihole
  {{- if and (eq .Values.service.dns.type "LoadBalancer") .Values.service.dns.loadBalancerIP }}
  annotations:
    metallb.universe.tf/loadBalancerIPs: {{ .Values.service.dns.loadBalancerIP }}
  {{- end }}
spec:
  type: {{ .Values.service.dns.type }}
  ports:
  - name: dns-udp
    port: {{ .Values.service.dns.port }}
    protocol: UDP
    targetPort: 53
    {{- if eq .Values.service.dns.type "NodePort" }}
    nodePort: {{ .Values.service.dns.nodePort }}
    {{- end }}
  - name: dns-tcp
    port: {{ .Values.service.dns.port }}
    protocol: TCP
    targetPort: 53
    {{- if eq .Values.service.dns.type "NodePort" }}
    nodePort: {{ .Values.service.dns.nodePort }}
    {{- end }}
  selector:
    app: pihole
---
apiVersion: v1
kind: Service
metadata:
  name: pihole-web
  namespace: pihole
spec:
  type: {{ .Values.service.web.type }}
  ports:
  - name: http
    port: {{ .Values.service.web.port }}
    targetPort: 80
    {{- if eq .Values.service.web.type "NodePort" }}
    nodePort: {{ .Values.service.web.nodePort }}
    {{- end }}
  selector:
    app: pihole
---
{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pihole-web-ingress
  namespace: pihole
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
  {{- if eq .Values.ingress.className "tailscale" }}
  - http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: pihole-web
            port:
              number: {{ .Values.service.web.port }}
  {{- else }}
  - host: {{ .Values.ingress.host | quote }}
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: pihole-web
            port:
              number: {{ .Values.service.web.port }}
  {{- end }}
{{- end }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pihole-pvc
  namespace: pihole
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: {{ .Values.persistence.storageClass }}
  resources:
    requests:
      storage: {{ .Values.persistence.size }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pihole
  namespace: pihole
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: pihole
  template:
    metadata:
      labels:
        app: pihole
    spec:
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
      - name: pihole
        image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - name: dns
          containerPort: 53
          protocol: UDP
        - name: dns-tcp
          containerPort: 53
          protocol: TCP
        - name: http
          containerPort: 80
        env:
        - name: TZ
          value: {{ .Values.env.TZ }}
        - name: WEBPASSWORD
          value: {{ .Values.env.WEBPASSWORD }}
        - name: DNS1
          value: "8.8.8.8"
        - name: DNS2
          value: "8.8.4.4"
        volumeMounts:
        - name: pihole-storage
          mountPath: /etc/pihole
        - name: dnsmasq-config
          mountPath: /etc/dnsmasq.d/custom.conf
          subPath: dnsmasq.conf
      volumes:
      - name: pihole-storage
        persistentVolumeClaim:
          claimName: pihole-pvc
      - name: dnsmasq-config
        configMap:
          name: pihole-config
