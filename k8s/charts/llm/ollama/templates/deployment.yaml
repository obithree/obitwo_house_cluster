apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  labels:
    app: ollama
    chart: {{ .Chart.Name }}-{{ .Chart.Version }}
    release: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      {{- if .Values.models }}
      initContainers:
      - name: model-downloader
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
        command:
          - /bin/sh
          - -c
          - |
            set -e

            # Ollamaサーバーをバックグラウンドで起動
            echo "Starting Ollama server for model download..."
            ollama serve &
            OLLAMA_PID=$!

            # サーバーが起動するまで待機
            for i in $(seq 1 60); do
              if curl -s http://localhost:11434 > /dev/null 2>&1; then
                echo "Ollama server is ready!"
                break
              fi
              echo "Waiting for server... ($i/60)"
              sleep 2
            done

            # 各モデルをダウンロード
            {{- range .Values.models }}
            echo "Checking model: {{ . }}"
            if ollama list | grep -q "{{ . }}"; then
              echo "Model {{ . }} already exists, skipping..."
            else
              echo "Pulling model {{ . }}..."
              ollama pull {{ . }}
              echo "Model {{ . }} installed successfully!"
            fi
            {{- end }}

            echo "All models ready!"
            kill $OLLAMA_PID || true
            wait $OLLAMA_PID || true
        # GPU不要のためNVIDIA hooksを無効化
        env:
        - name: NVIDIA_VISIBLE_DEVICES
          value: "none"
        volumeMounts:
        {{- if .Values.persistence.enabled }}
        - name: data
          mountPath: /root/.ollama
        {{- end }}
        resources:
          requests:
            memory: "512Mi"
            cpu: "100m"
          limits:
            memory: "2Gi"
            cpu: "500m"
      {{- end }}
      containers:
      - name: {{ .Chart.Name }}
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - name: http
          containerPort: {{ .Values.service.targetPort }}
          protocol: TCP
        {{- if .Values.gpu.enabled }}
        env:
        - name: NVIDIA_VISIBLE_DEVICES
          value: {{ .Values.gpu.visibleDevices | quote }}
        - name: NVIDIA_DRIVER_CAPABILITIES
          value: {{ .Values.gpu.driverCapabilities | quote }}
        {{- end }}
        {{- with .Values.env }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        volumeMounts:
        {{- if .Values.persistence.enabled }}
        - name: data
          mountPath: /root/.ollama
        {{- end }}
        resources:
          requests:
            memory: {{ .Values.resources.requests.memory }}
            cpu: {{ .Values.resources.requests.cpu }}
            {{- if .Values.gpu.enabled }}
            nvidia.com/gpu: {{ .Values.resources.requests.gpu | quote }}
            {{- end }}
          limits:
            memory: {{ .Values.resources.limits.memory }}
            cpu: {{ .Values.resources.limits.cpu }}
            {{- if .Values.gpu.enabled }}
            nvidia.com/gpu: {{ .Values.resources.limits.gpu | quote }}
            {{- end }}
      volumes:
      {{- if .Values.persistence.enabled }}
      - name: data
        persistentVolumeClaim:
          claimName: ollama-data
      {{- end }}
