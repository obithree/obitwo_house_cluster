replicaCount: 1

image:
  tag: "latest"

service:
  type: NodePort

persistence:
  size: 10Gi

resources:
  requests:
    memory: "2Gi"
    cpu: "1000m"
    gpu: "1"
  limits:
    memory: "4Gi"
    cpu: "2000m"
    gpu: "1"

gpu:
  enabled: true

# 開発環境では軽量モデルをダウンロード
# VRAM 8GB推奨: gemma3:2b (最新・軽量・高速)
models:
  - gemma3:2b
  - mistral
  - qwen3.5:9b