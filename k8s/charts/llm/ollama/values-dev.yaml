replicaCount: 1

image:
  tag: "latest"

service:
  type: NodePort

persistence:
  size: 10Gi

resources:
  requests:
    memory: "4Gi"
    cpu: "2000m"
    gpu: "1"
  limits:
    memory: "8Gi"
    cpu: "4000m"
    gpu: "1"

gpu:
  enabled: true

# インストールするモデルのリスト
models:
  - gemma3:4b
  - mistral
  - qwen3.5:9b