apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
  labels:
    app: litellm
    chart: {{ .Chart.Name }}-{{ .Chart.Version }}
    release: {{ .Release.Name }}
data:
  config.yaml: |
    model_list:
    {{- range .Values.models }}
      - model_name: {{ .name }}
        litellm_params:
          model: ollama_chat/{{ .ollamaModel }}
          api_base: {{ $.Values.ollama.baseUrl }}
          drop_params: true
        model_info:
          supports_reasoning: false
    {{- end }}
    litellm_settings:
      drop_params: true
      modify_params: true
      num_retries: 3
      request_timeout: 600
      default_litellm_params:
        drop_params: true
    router_settings:
      disable_reasoning: true
