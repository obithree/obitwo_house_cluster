replicaCount: 1

nodeSelector:
  node-role: worker
  node-type: pc

image:
  repository: ghcr.io/open-webui/open-webui
  pullPolicy: IfNotPresent
  tag: "main"

service:
  type: NodePort
  port: 8080
  targetPort: 8080

persistence:
  enabled: true
  storageClass: ""
  accessMode: ReadWriteOnce
  size: 5Gi

resources:
  requests:
    memory: "512Mi"
    cpu: "500m"
  limits:
    memory: "1Gi"
    cpu: "1000m"

ollama:
  baseUrl: "http://ollama:11434"

ingress:
  enabled: true
  className: traefik
  host: open-webui.home
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "600"

env: []
