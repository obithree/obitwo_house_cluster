replicaCount: 1

image:
  tag: "main"

service:
  type: NodePort

persistence:
  size: 5Gi

resources:
  requests:
    memory: "512Mi"
    cpu: "500m"
  limits:
    memory: "2Gi"
    cpu: "2000m"

ollama:
  baseUrl: "http://ollama:11434"

ingress:
  enabled: true
  className: nginx
  host: open-webui.home
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
