replicaCount: 1

image:
  repository: siutin/stable-diffusion-webui-docker
  tag: latest-cuda-12.8.1
  pullPolicy: IfNotPresent

resources:
  limits:
    nvidia.com/gpu: 1

env:
  - name: CLI_ARGS
    value: "--api --listen"
  - name: DOCKER_MODS
    value: "linuxserver/mods:stable-diffusion-webui-api"
