apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-stable-diffusion-webui
  labels:
    app.kubernetes.io/name: stable-diffusion-webui
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: 7860
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: stable-diffusion-webui
    app.kubernetes.io/instance: {{ .Release.Name }}
