apiVersion: v1
kind: Secret
metadata:
  name: tailscale-operator-oauth
  namespace: {{ .Release.Namespace }}
  annotations:
    # ArgoCDがdataフィールドを上書きしないようにするため、
    # ArgoCD Application側でignoredDifferencesを設定すること
type: Opaque
data:
  # 初期値は空。デプロイ後に手動で設定する:
  # kubectl patch secret tailscale-operator-oauth -n tailscale \
  #   --type='json' \
  #   -p='[{"op":"replace","path":"/data/client_id","value":"'$(echo -n "<CLIENT_ID>" | base64)'"},
  #         {"op":"replace","path":"/data/client_secret","value":"'$(echo -n "<CLIENT_SECRET>" | base64)'"}]'
  client_id: ""
  client_secret: ""
