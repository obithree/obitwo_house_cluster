apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-alloy-config
  namespace: {{ .Release.Namespace }}
data:
  config.alloy: |
    // =====================================================================
    // Node-level metrics (node_exporter equivalent)
    // Runs on each node via DaemonSet; NODE_NAME is injected via Downward API
    // =====================================================================
    prometheus.exporter.unix "local_system" {
      procfs_path = "/host/proc"
      sysfs_path  = "/host/sys"
      rootfs_path = "/host/root"
    }

    discovery.relabel "node_exporter_targets" {
      targets = prometheus.exporter.unix.local_system.targets

      rule {
        target_label = "node"
        replacement  = env("NODE_NAME")
      }
    }

    prometheus.scrape "node_exporter" {
      targets         = discovery.relabel.node_exporter_targets.output
      forward_to      = [prometheus.remote_write.prometheus.receiver]
      scrape_interval = "15s"
    }

    // =====================================================================
    // Remote write to Prometheus
    // =====================================================================
    prometheus.remote_write "prometheus" {
      endpoint {
        url = "{{ .Values.prometheus.remoteWrite.url }}"
      }
    }

    // =====================================================================
    // Pod log collection → Loki
    // Discovers pods on the current node and streams their logs
    // =====================================================================
    discovery.kubernetes "pods" {
      role = "pod"
      selectors {
        role  = "pod"
        field = "spec.nodeName=" + env("NODE_NAME")
      }
    }

    discovery.relabel "pod_logs" {
      targets = discovery.kubernetes.pods.targets

      rule {
        source_labels = ["__meta_kubernetes_pod_phase"]
        regex         = "Pending|Succeeded|Failed|Unknown"
        action        = "drop"
      }

      rule {
        source_labels = ["__meta_kubernetes_namespace"]
        target_label  = "namespace"
      }

      rule {
        source_labels = ["__meta_kubernetes_pod_name"]
        target_label  = "pod"
      }

      rule {
        source_labels = ["__meta_kubernetes_pod_container_name"]
        target_label  = "container"
      }

      rule {
        source_labels = ["__meta_kubernetes_pod_label_app"]
        target_label  = "app"
      }

      rule {
        target_label = "job"
        replacement  = "k8s-pods"
      }
    }

    loki.source.kubernetes "pod_logs" {
      targets    = discovery.relabel.pod_logs.output
      forward_to = [loki.write.loki.receiver]
    }

    loki.write "loki" {
      endpoint {
        url = "{{ .Values.loki.url }}"
      }
    }
