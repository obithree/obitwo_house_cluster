apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-alloy-events-config
  namespace: {{ .Release.Namespace }}
data:
  config.alloy: |
    // =====================================================================
    // Kubernetes Events collection → Loki
    // Runs as a single-replica Deployment (not DaemonSet) to avoid duplicates
    // =====================================================================
    loki.source.kubernetes_events "k8s_events" {
      namespaces = []
      job_name   = "k8s-events"
      forward_to = [loki.write.loki.receiver]
    }

    loki.write "loki" {
      endpoint {
        url = "{{ .Values.loki.url }}"
      }
    }
