apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cluster-manifests
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/obitwo/obitwo_house_cluster.git  # 実際のリポジトリURLに変更してください
    targetRevision: HEAD
    path: k8s/manifests
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
