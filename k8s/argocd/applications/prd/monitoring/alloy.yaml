apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring-alloy
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/obithree/obitwo_house_cluster.git
    targetRevision: main
    path: k8s/charts/monitoring/alloy
    helm:
      releaseName: alloy
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
