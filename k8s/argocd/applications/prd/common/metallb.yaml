apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: metallb-prd
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://metallb.github.io/metallb
    targetRevision: 0.14.9
    chart: metallb
  destination:
    server: https://kubernetes.default.svc
    namespace: common
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
