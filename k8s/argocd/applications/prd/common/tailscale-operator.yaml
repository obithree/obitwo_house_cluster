apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tailscale-operator-prd
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/obithree/obitwo_house_cluster.git
    targetRevision: main
    path: k8s/charts/common/tailscale-operator
    helm:
      valueFiles:
        - values-prd.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: tailscale
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
  # Secretのdata（認証情報）は手動管理のため差分検知から除外する
  ignoreDifferences:
    - group: ""
      kind: Secret
      name: operator-oauth
      jsonPointers:
        - /data
